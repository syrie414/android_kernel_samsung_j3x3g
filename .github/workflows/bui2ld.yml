name: Build Linkit2me Kernel (J320H) Pro

on:
  push:
    branches: [ master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache clang cpio flex \
          libelf-dev libncurses-dev libssl-dev lld llvm python2 python3 rsync \
          unzip wget zip zstd
        sudo ln -sf /usr/bin/python2 /usr/bin/python

    # ميزة الـ Cache لتسريع البناء (مثل سكربت S10)
    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-kernel-j320h-${{ github.sha }}
        restore-keys: ccache-kernel-j320h-

    - name: Setup Toolchain
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b android-wear-5.1.0_r1 --depth=1 toolchain
        chmod -R +x toolchain/bin/

    - name: Fix Legacy Scripts (DTC Fix)
      run: |
        sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c_shipped || true
        sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.l || true

    - name: Run Build Script
      run: |
        # تفعيل الـ ccache داخل البيئة
        export CCACHE_DIR=$HOME/.cache/ccache
        export PATH="/usr/lib/ccache:$PATH"
        ccache -z # تصفير الإحصائيات لبدء مراقبة البناء
        
        chmod +x build.sh
        ./build.sh
        
        ccache -s # عرض إحصائيات التوفير بعد البناء

    - name: Package with AnyKernel3 (Professional Way)
      run: |
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1 AnyKernel
        # إعدادات مخصصة لـ J320H
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel/anykernel.sh
        sed -i 's|block=.*|block=/dev/block/platform/sdio_emmc/by-name/BOOT;|g' AnyKernel/anykernel.sh
        
        if [ -f out/boot.img ]; then
          # ننسخ الـ boot.img الناتج للـ AnyKernel
          cp out/boot.img AnyKernel/boot.img
          cd AnyKernel && zip -r9 "../Linkit2me-J320H-Extreme-Kernel.zip" * -x .git README.md
        fi

    - name: Upload Artifacts (boot.img + Zip)
      uses: actions/upload-artifact@v4
      with:
        name: Linkit2me-J320H-Final
        path: |
          out/boot.img
          Linkit2me-J320H-Extreme-Kernel.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/master'
      with:
        files: Linkit2me-J320H-Extreme-Kernel.zip
        tag_name: Build-${{ github.run_number }}
        name: "Release J320H Kernel - Build #${{ github.run_number }}"
        body: |
          🚀 New Build Ready!
          - Device: Samsung Galaxy J320H
          - Mode: SELinux Permissive
          - Built with GCC 4.9 & AnyKernel3
        overwrite: true
      env:
        GITHUB_TOKEN: ${{ secrets.LINKIT }}

