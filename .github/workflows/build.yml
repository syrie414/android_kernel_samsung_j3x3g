name: Build Linkit2me Kernel (J320H)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user root

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          apt-get update
          dpkg --add-architecture i386
          apt-get install -y git curl build-essential bc bison flex \
            libssl-dev libelf-dev zip gcc-multilib g++-multilib \
            libc6-dev-i386 lib32ncurses5-dev lib32z1-dev \
            libncurses5 libncurses5-dev python3 cpio
          ln -sf /usr/bin/python3 /usr/bin/python

      - name: Setup Toolchain
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
            -b android-wear-5.1.0_r1 --depth=1 toolchain
          chmod -R +x toolchain/bin/

      - name: Fix Legacy Scripts
        run: |
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c_shipped || true
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.l || true

      - name: Build Kernel
        run: |
          chmod +x build.sh
          ./build.sh 2>&1 | tee build.log

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log

      - name: Package Kernel in AnyKernel
        run: |
          git clone https://github.com/syrie414/AnyKernel3 --depth=1 AnyKernel

          # تعطيل فحص الجهاز
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel/anykernel.sh || true
          sed -i 's|kernel.string=.*|kernel.string=Linkit2me-J320H;|g' AnyKernel/anykernel.sh || true

          # نسخ zImage مباشرة كـ boot.img
          cp -f out/arch/arm/boot/zImage AnyKernel/boot.img

          cd AnyKernel
          zip -r9 "../Linkit2me-J320H-Kernel-AnyKernel.zip" . -x ".git/*" "README.md"

      - name: Upload Flashable Zip
        uses: actions/upload-artifact@v4
        with:
          name: Linkit2me_J320H_Zip
          path: Linkit2me-J320H-Kernel-AnyKernel.zip
