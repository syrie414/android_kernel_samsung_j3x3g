name: Build Linkit2me Kernel (J320H)

on:
  push:
    branches: [ master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user root

    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4

    - name: Setup Environment inside Container
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y git curl sudo
        dpkg --add-architecture i386
        apt-get update
        apt-get install -y build-essential bc bison flex libssl-dev libelf-dev zip \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev lib32z1-dev python2 cpio
        ln -sf /usr/bin/python2 /usr/bin/python

    - name: Manual Toolchain Setup
      run: |
        # تحميل المترجم في المجلد المتوقع من قبل build.sh
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b android-wear-5.1.0_r1 --depth=1 toolchain
        chmod -R +x toolchain/bin/
        # تحميل أداة mkbootimg لتكون جاهزة للسكربت
        curl -sL https://raw.githubusercontent.com/osm0sis/mkbootimg/master/mkbootimg -o toolchain/mkbootimg
        chmod +x toolchain/mkbootimg

    - name: Fix Legacy Scripts
      run: |
        sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c_shipped || true
        sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.l || true

    - name: Run Build Script
      run: |
        # إعطاء صلاحية التنفيذ وتشغيل السكربت
        chmod +x build.sh
        ./build.sh

    - name: Upload Boot Image
      uses: actions/upload-artifact@v4
      with:
        name: J320H-Boot-Image
        path: out/boot.img

    - name: Package with AnyKernel3 (Optional)
      run: |
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1 AnyKernel
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel/anykernel.sh
        sed -i 's|block=.*|block=/dev/block/platform/sdio_emmc/by-name/BOOT;|g' AnyKernel/anykernel.sh
        
        if [ -f out/boot.img ]; then
          # في J320H أحياناً نضع الـ boot.img كاملاً داخل AnyKernel أو الـ zImage فقط
          # هنا سنعتمد وضع الـ zImage و الـ dtb كما هو معتاد
          cp out/arch/arm/boot/zImage AnyKernel/zImage
          # إذا كان هناك ملف DTB ناتج ننسخه أيضاً
          find out/arch/arm/boot/dts/ -name "*.dtb" -exec cp {} AnyKernel/dtb \; || true
          
          cd AnyKernel && zip -r9 "../Linkit2me-J320H-Kernel-AnyKernel.zip" * -x .git README.md
        fi

    - name: Upload Flashable Zip
      uses: actions/upload-artifact@v4
      with:
        name: Linkit2me_J320H_Zip
        path: Linkit2me-J320H-Kernel-AnyKernel.zip
