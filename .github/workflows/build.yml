name: Build Linkit2me Kernel (J320H)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user root

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          apt-get update
          dpkg --add-architecture i386
          apt-get install -y git curl build-essential bc bison flex \
            libssl-dev libelf-dev zip gcc-multilib g++-multilib \
            libc6-dev-i386 lib32ncurses5-dev lib32z1-dev \
            libncurses5 libncurses5-dev python3 cpio
          ln -sf /usr/bin/python3 /usr/bin/python

      - name: Setup Toolchain
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
            -b android-wear-5.1.0_r1 --depth=1 toolchain
          chmod -R +x toolchain/bin/

      - name: Fix Legacy Scripts
        run: |
          # إصلاح أخطاء التوافق مع النسخ الحديثة من Bison/Flex
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c_shipped || true
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.l || true

      - name: Build Kernel & DTB
        run: |
          export ARCH=arm
          export CROSS_COMPILE=$(pwd)/toolchain/bin/arm-linux-androideabi-
          
          # تنظيف وبناء باستخدام الكونفيج الصحيح لجهازك
          make clean
          make mrproper
          make j3x3g-dt_defconfig
          
          # بناء الكيرنل (zImage) وملفات شجرة الأجهزة (dtbs)
          make -j$(nproc) zImage dtbs

      - name: Package in AnyKernel3
        run: |
          # جلب أداة AnyKernel3 الرسمية
          git clone https://github.com/osm0sis/AnyKernel3 --depth=1 AnyKernel
          
          # إعداد السكريبت ليتناسب مع J320H
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel/anykernel.sh
          sed -i 's|kernel.string=.*|kernel.string=Linkit2me-J320H-Final;|g' AnyKernel/anykernel.sh
          
          # تحديد مسار بارتشن الـ BOOT (تأكد من الاسم كابيتال لسامسونج)
          sed -i 's|block=/dev/block/.*|block=/dev/block/platform/sdio_emmc/by-name/BOOT;|g' AnyKernel/anykernel.sh
          
          # --- معالجة الـ DTB المنفصل ---
          # نجمع كل ملفات الـ dtb الناتجة في ملف واحد اسمه 'dtb' ليفهمه AnyKernel
          cat arch/arm/boot/dts/*.dtb > AnyKernel/dtb

          # نسخ الكيرنل الخام (zImage)
          cp -f arch/arm/boot/zImage AnyKernel/zImage
          
          # إضافة توقيع سامسونج الإجباري (SEANDROIDENFORCE)
          echo -n "SEANDROIDENFORCE" >> AnyKernel/zImage
          
          # ضغط الملف النهائي
          cd AnyKernel
          zip -r9 "../Linkit2me-J320H-Flashable.zip" . -x ".git/*" "README.md"

      - name: Upload Final Flashable Zip
        uses: actions/upload-artifact@v4
        with:
          name: Linkit2me_J320H_Kernel
          path: Linkit2me-J320H-Flashable.zip
