name: Build Linkit2me Kernel (J320H)

on:
  push:
    branches: [ master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user root

    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4

    - name: Setup Environment inside Container
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y git curl sudo
        dpkg --add-architecture i386
        apt-get update
        apt-get install -y build-essential bc bison flex libssl-dev libelf-dev zip \
          gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev lib32z1-dev python2
        ln -sf /usr/bin/python2 /usr/bin/python

    - name: Manual Toolchain Setup
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b android-wear-5.1.0_r1 --depth=1 toolchain
        chmod -R +x toolchain/bin/
        chmod -R +x toolchain/libexec/gcc/arm-linux-androideabi/4.9.x-google/

    - name: Fix Legacy Scripts
      run: |
        sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c_shipped || true
        sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.l || true

    - name: Compilation
      run: |
        export ARCH=arm
        export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/bin/arm-linux-androideabi-
        export KBUILD_BUILD_USER="imad"
        export KBUILD_BUILD_HOST="Linkit2me-Lab"
        
        # استخدام السكربت أو الأوامر مباشرة مع إضافة dtbs
        mkdir -p out
        make O=out mrproper
        make O=out j3x3g-dt_defconfig
        
        echo "Starting build process (Kernel + DTBs)..."
        # إضافة dtbs هنا هو السر عشان تطلع ملفات الـ DTB اللي سألت عنها
        make O=out KCFLAGS="-fcommon" HOSTCFLAGS="-fcommon" -j$(nproc --all) zImage dtbs

    - name: Package with AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1 AnyKernel
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel/anykernel.sh
        sed -i 's|block=.*|block=/dev/block/platform/sdio_emmc/by-name/BOOT;|g' AnyKernel/anykernel.sh
        
        if [ -f out/arch/arm/boot/zImage ]; then
          cp out/arch/arm/boot/zImage AnyKernel/zImage
          cd AnyKernel && zip -r9 "../Linkit2me-J320H-Kernel.zip" * -x .git README.md
          cd ..
        else
          echo "ERROR: zImage not found!" && exit 1
        fi

    

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Linkit2me_J320H_Kernel
        path: Linkit2me-J320H-Kernel.zip
