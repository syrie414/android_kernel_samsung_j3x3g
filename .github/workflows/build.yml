name: Build Linkit2me Kernel (J320H)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user root

    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4

    - name: Setup Environment inside Container
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update

        dpkg --add-architecture i386
        apt-get update

        apt-get install -y \
          git curl sudo build-essential bc bison flex \
          libssl-dev libelf-dev zip \
          gcc-multilib g++-multilib \
          libc6-dev-i386 lib32ncurses5-dev lib32z1-dev \
          libncurses5 libncurses5-dev \
          python2 cpio

        ln -sf /usr/bin/python2 /usr/bin/python

    - name: Manual Toolchain Setup
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
          -b android-wear-5.1.0_r1 --depth=1 toolchain

        chmod -R +x toolchain/bin/

    - name: Fix Legacy Scripts
      run: |
        sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c_shipped || true
        sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.l || true

    - name: Run Build Script
      run: |
        chmod +x build.sh
        ./build.sh 2>&1 | tee build.log

    - name: Upload Build Logs
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log

    - name: Upload Boot Image
      uses: actions/upload-artifact@v4
      with:
        name: J320H-Boot-Image
        path: out/boot.img

    - name: Package with AnyKernel3 (Clean Boot.img Method)
      run: |
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1 AnyKernel

        # تعطيل فحص الجهاز
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel/anykernel.sh

        # تحديد البارتشن الصحيح
        sed -i 's|block=.*|block=/dev/block/platform/sdio_emmc/by-name/BOOT;|g' AnyKernel/anykernel.sh

        # أهم تعديل: استخدام boot.img مباشرة
        sed -i 's|kernel.string=.*|kernel.string=Linkit2me-J320H;|g' AnyKernel/anykernel.sh

        if [ -f out/boot.img ]; then
          cp out/boot.img AnyKernel/boot.img
        else
          echo "❌ boot.img not found!"
          exit 1
        fi

        cd AnyKernel
        zip -r9 "../Linkit2me-J320H-Kernel-AnyKernel.zip" * -x .git README.md

    - name: Upload Flashable Zip
      uses: actions/upload-artifact@v4
      with:
        name: Linkit2me_J320H_Zip
        path: Linkit2me-J320H-Kernel-AnyKernel.zip
